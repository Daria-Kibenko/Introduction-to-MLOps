# .gitlab-ci.yml  -  CI/CD пайплайн для MLOps-проекта качества вина
#
# Запускается при каждом Merge Request в ветку main.
# Этапы:
#   1. lint  - проверка кода линтером (flake8)
#   2. data  - проверка доступности данных и модели через DVC
#   3. test  - запуск тестов API
image: python:3.11-slim

# Глобальный кэш (переиспользуем пакеты между джобами)
cache:
  paths:
    - .pip-cache/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

# Порядок этапов
stages:
  - lint
  - data
  - test

# Переиспользуемый блок установки зависимостей
.install_base: &install_base
  before_script:
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt

# Этап 1 - Линтер
lint:
  stage: lint
  <<: *install_base
  script:
    - pip install --quiet flake8
    - echo "Running flake8 linter..."
    - flake8 src/ dags/ tests/
      --max-line-length=100
      --exclude=__pycache__,.git
      --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Этап 2 - Проверка данных и модели через DVC
check_dvc:
  stage: data
  <<: *install_base
  script:
    - pip install --quiet dvc[s3]
    # Передаём ключи доступа к S3 из секретов GitLab CI
    - echo "Configuring DVC remote..."
    - dvc remote modify myremote access_key_id     "$AWS_ACCESS_KEY_ID"
    - dvc remote modify myremote secret_access_key "$AWS_SECRET_ACCESS_KEY"
    - echo "Скачиваем файлы, отслеживаемые DVC..."
    - dvc pull
    # Проверяем, что файл данных успешно скачан
    - test -f data/wine_quality.csv   || (echo "ERROR: data/wine_quality.csv missing" && exit 1)
    # Проверяем, что файл модели успешно скачан
    - test -f models/wine_quality_model.pkl || (echo "ERROR: model file missing" && exit 1)
    - echo "Проверка DVC прошла успешно."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Этап 3 - Тесты API
test_api:
  stage: test
  <<: *install_base
  script:
    - pip install --quiet pytest pytest-cov
    - echo "Running API tests..."
    - pytest tests/ -v
        --tb=short
        --cov=src
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 7 days  # артефакты хранятся 7 дней
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# .gitlab-ci.yml  -  CI/CD пайплайн для MLOps-проекта качества вина
#
# Запускается при каждом Merge Request в ветку main.
# Этапы:
#   1. lint  - проверка кода линтером (flake8)
#   2. data  - проверка версионирования данных и модели через DVC
#   3. test  - запуск тестов API

image: python:3.11-slim

# Глобальный кэш pip-пакетов между джобами
cache:
  paths:
    - .pip-cache/

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

stages:
  - lint
  - data
  - test

# Переиспользуемый блок установки зависимостей
.install_base: &install_base
  before_script:
    - pip install --quiet --upgrade pip
    - pip install --quiet -r requirements.txt

# Этап 1 - Линтер
lint:
  stage: lint
  <<: *install_base
  script:
    - pip install --quiet flake8
    - echo "Запускаем flake8..."
    - flake8 src/ dags/ tests/
      --max-line-length=100
      --exclude=__pycache__,.git
      --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Этап 2 - Проверка DVC
# Проверяем:
#   а) наличие .dvc/config и .dvc-файлов в репозитории
#   б) успешность dvc pull (данные и модель скачиваются из хранилища)
#   в) наличие реальных файлов после pull
check_dvc:
  stage: data
  <<: *install_base
  script:
    - pip install --quiet dvc[s3]

    # Проверяем наличие конфига DVC в репозитории
    - echo "Проверяем наличие .dvc/config..."
    - test -f .dvc/config || (echo "ОШИБКА: .dvc/config не найден" && exit 1)

    # Проверяем наличие .dvc-указателей (они должны быть закоммичены в git)
    - echo "Проверяем наличие .dvc-указателей..."
    - test -f data/wine_quality.csv.dvc         || (echo "ОШИБКА: data/wine_quality.csv.dvc не найден" && exit 1)
    - test -f models/wine_quality_model.pkl.dvc || (echo "ОШИБКА: models/wine_quality_model.pkl.dvc не найден" && exit 1)
    - test -f models/metadata.json.dvc          || (echo "ОШИБКА: models/metadata.json.dvc не найден" && exit 1)

    # Передаём ключи доступа к S3 из секретов GitLab CI (переменные окружения)
    - dvc remote modify myremote access_key_id     "$AWS_ACCESS_KEY_ID"
    - dvc remote modify myremote secret_access_key "$AWS_SECRET_ACCESS_KEY"

    # Скачиваем все отслеживаемые файлы из удалённого хранилища
    - echo "Запускаем dvc pull..."
    - dvc pull

    # Проверяем, что реальные файлы успешно скачались
    - echo "Проверяем наличие файлов после dvc pull..."
    - test -f data/wine_quality.csv             || (echo "ОШИБКА: data/wine_quality.csv не скачался" && exit 1)
    - test -f models/wine_quality_model.pkl     || (echo "ОШИБКА: модель не скачалась" && exit 1)
    - test -f models/metadata.json              || (echo "ОШИБКА: metadata.json не скачался" && exit 1)
    - echo "Проверка DVC прошла успешно."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Этап 3 - Тесты API
test_api:
  stage: test
  <<: *install_base
  script:
    - pip install --quiet pytest pytest-cov
    - echo "Запускаем тесты API..."
    - pytest tests/ -v
        --tb=short
        --cov=src
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
